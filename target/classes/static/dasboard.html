<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="dashboard">

    <h1>Dashboard</h1>

    <div class="card">Income: ₹<span id="income"></span></div>
    <div class="card">Expense: ₹<span id="expense"></span></div>
    <div class="card">Balance: ₹<span id="balance"></span></div>
    <div class="card">Health Score: <span id="score"></span>%</div>
    <div class="card">Suggestion: <span id="suggestion"></span></div>

    <div class="btn-group">
        <button onclick="goExpense()">Add Expense</button>
        <button onclick="goIncome()">Add Income</button>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

    <canvas id="expenseChart"></canvas>

</div>

<script src="js/config.js"></script>
<script src="js/dashboard.js"></script>

</body>
</html>
